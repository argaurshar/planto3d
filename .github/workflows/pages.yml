name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent Pages deployment at a time.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Repo is served at https://<owner>.github.io/planto3d/
      NEXT_PUBLIC_BASE_PATH: /planto3d
      STATIC_EXPORT: "true"
      NEXT_PUBLIC_STATIC: "true"
    steps:
      - uses: actions/checkout@v4

      # Auto-enable Pages (Actions source) so the deploy doesn't 404 if the repo
      # setting hasn't been flipped manually.
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The static export cannot include server route handlers (POST), so strip
      # them for this build only. The repo source keeps them for the server build.
      - name: Remove server-only API routes for static export
        run: rm -rf app/api

      - name: Build static site
        run: npm run build

      - name: Disable Jekyll (serve _next/*)
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
